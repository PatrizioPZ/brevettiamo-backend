<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrevettIAmo - Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; background:#f0f2f5; }
.navbar { background:#1e3c72; color:white; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; }
.container { max-width:1000px; margin:0 auto; padding:20px; }
.card { background:white; padding:20px; border-radius:10px; margin-bottom:20px; }
h2 { color:#1e3c72; margin-bottom:15px; }
table { width:100%; border-collapse:collapse; }
th { background:#f8f9fa; padding:10px; text-align:left; }
td { padding:10px; border-bottom:1px solid #eee; }
input { width:80px; padding:5px; border:1px solid #ddd; border-radius:3px; }
button { padding:8px 15px; border:none; border-radius:5px; cursor:pointer; }
.btn-verde { background:#28a745; color:white; }
.btn-verde:hover { background:#218838; }
.btn-rosso { background:#dc3545; color:white; }
.btn-rosso:hover { background:#c82333; }
.btn-salva { background:#1e3c72; color:white; padding:10px 20px; margin-top:15px; }
.alert { padding:15px; border-radius:5px; margin-bottom:15px; display:none; }
.alert.show { display:block; }
.alert-success { background:#d4edda; color:#155724; }
.alert-error { background:#f8d7da; color:#721c24; }
</style>
</head>
<body>

<<nav class="navbar">
<h1>BrevettIAmo - Admin Panel</h1>
</nav>

<div class="container">
<div class="alert alert-success" id="successAlert"></div>
<div class="alert alert-error" id="errorAlert"></div>

<div class="card">
<h2>Prezzi Servizi Singoli</h2>
<table>
<<thead>
<tr><th>Servizio</th><th>Prezzo (EUR)</th><th>Crediti</th><th>Stato</th></tr>
</thead>
<tbody id="prezziSingoli"></tbody>
</table>
<button class="btn-salva" onclick="salvaPrezzi()">Salva Prezzi</button>
</div>

<div class="card">
<h2>Prezzi Abbonamenti</h2>
<table>
<<thead>
<tr><th>Piano</th><th>Prezzo Mensile (EUR)</th><th>Servizi/Mese</th></tr>
</thead>
<tbody id="prezziAbbonamenti"></tbody>
</table>
<button class="btn-salva" onclick="salvaAbbonamenti()">Salva Abbonamenti</button>
</div>

<div class="card">
<h2>Configurazione AI</h2>
<p>Modello attuale: <strong id="modelloAI">meta-llama/llama-3.1-8b-instruct</strong></p>
<p>Stato: <strong id="statoAI">Attivo</strong></p>
</div>
</div>

<script>
var SUPABASE_URL = 'https://jtekrvlmqnluvaiapmwb.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_p9WH85YPfwtaKp4tfcDwug_Q9duausk';
var supabaseClient = null;

var serviziDefault = [
  { id: 'priorArtBase', name: 'Ricerca Prior Art Base', prezzo: 11, credits: 1, attivo: true },
  { id: 'priorArtAdvanced', name: 'Ricerca Prior Art Avanzata', prezzo: 23, credits: 2, attivo: true },
  { id: 'brevettabilita', name: 'Analisi Brevettabilita', prezzo: 18, credits: 1, attivo: true },
  { id: 'claimsBase', name: 'Redazione Claims Base', prezzo: 23, credits: 1, attivo: true },
  { id: 'claimsPro', name: 'Redazione Claims Pro', prezzo: 47, credits: 2, attivo: true },
  { id: 'traduzioneClaims', name: 'Traduzione Claims', prezzo: 14, credits: 1, attivo: true },
  { id: 'monitoraggioConcorrenza', name: 'Monitoraggio Concorrenza', prezzo: 35, credits: 3, attivo: true },
  { id: 'consulenza11', name: 'Consulenza 1:1', prezzo: 59, credits: 5, attivo: true },
  { id: 'analisiTecnica', name: 'Analisi Tecnica', prezzo: 29, credits: 2, attivo: true },
  { id: 'ricercaFigurativa', name: 'Ricerca Figurativa', prezzo: 23, credits: 2, attivo: true },
  { id: 'nullita', name: 'Analisi Nullita', prezzo: 35, credits: 3, attivo: true },
  { id: 'opposizione', name: 'Preparazione Opposizione', prezzo: 47, credits: 3, attivo: true },
  { id: 'licensing', name: 'Strategia Licensing', prezzo: 59, credits: 4, attivo: true },
  { id: 'valorizzazione', name: 'Valorizzazione Brevetto', prezzo: 99, credits: 5, attivo: true },
  { id: 'dueDiligence', name: 'Due Diligence IP', prezzo: 149, credits: 6, attivo: true },
  { id: 'freedomToOperate', name: 'Freedom to Operate', prezzo: 79, credits: 4, attivo: true },
  { id: 'patentabilitySearch', name: 'Patentability Search', prezzo: 18, credits: 1, attivo: true },
  { id: 'landscapeAnalysis', name: 'Landscape Analysis', prezzo: 59, credits: 3, attivo: true },
  { id: 'cad', name: 'Disegno CAD Professionale', prezzo: 99, credits: 4, attivo: true }
];

var abbonamentiDefault = [
  { id: 'starter', name: 'Starter', prezzo: 29, servizi: 10 },
  { id: 'pro', name: 'Pro', prezzo: 99, servizi: 50 },
  { id: 'enterprise', name: 'Enterprise', prezzo: 299, servizi: 999 }
];

function init() {
  if (window.supabase && window.supabase.createClient) {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    caricaPrezzi();
  } else {
    showError('Errore connessione Supabase');
  }
}

setTimeout(init, 500);

function caricaPrezzi() {
  var html = '';
  for (var i = 0; i < serviziDefault.length; i++) {
    var s = serviziDefault[i];
    var btnClass = s.attivo ? 'btn-verde' : 'btn-rosso';
    var btnText = s.attivo ? 'Attivo' : 'Disattivato';
    html += '<tr>';
    html += '<td>' + s.name + '</td>';
    html += '<td><input type="number" id="prezzo_' + s.id + '" value="' + s.prezzo + '"></td>';
    html += '<td><input type="number" id="crediti_' + s.id + '" value="' + s.credits + '"></td>';
    html += '<td><button class="' + btnClass + '" id="btn_' + s.id + '" onclick="toggleServizio(\'' + s.id + '\')">' + btnText + '</button></td>';
    html += '</tr>';
  }
  document.getElementById('prezziSingoli').innerHTML = html;

  var html2 = '';
  for (var j = 0; j < abbonamentiDefault.length; j++) {
    var a = abbonamentiDefault[j];
    html2 += '<tr>';
    html2 += '<td>' + a.name + '</td>';
    html2 += '<td><input type="number" id="abb_prezzo_' + a.id + '" value="' + a.prezzo + '"></td>';
    html2 += '<td><input type="number" id="abb_servizi_' + a.id + '" value="' + a.servizi + '"></td>';
    html2 += '</tr>';
  }
  document.getElementById('prezziAbbonamenti').innerHTML = html2;
}

function toggleServizio(id) {
  var btn = document.getElementById('btn_' + id);
  var attuale = btn.textContent === 'Attivo';
  var nuovo = !attuale;
  
  if (nuovo) {
    btn.textContent = 'Attivo';
    btn.className = 'btn-verde';
  } else {
    btn.textContent = 'Disattivato';
    btn.className = 'btn-rosso';
  }
}

function salvaPrezzi() {
  var prezzi = [];
  for (var i = 0; i < serviziDefault.length; i++) {
    var s = serviziDefault[i];
    var btn = document.getElementById('btn_' + s.id);
    prezzi.push({
      id: s.id,
      prezzo: parseInt(document.getElementById('prezzo_' + s.id).value),
      credits: parseInt(document.getElementById('crediti_' + s.id).value),
      attivo: btn.textContent === 'Attivo'
    });
  }
  
  if (supabaseClient) {
    supabaseClient.from('config_prezzi').upsert({ id: 'servizi', dati: prezzi }).then(function() {
      showSuccess('Prezzi e stati salvati su Supabase');
    }).catch(function(err) {
      showError('Errore: ' + err.message);
    });
  }
}

function salvaAbbonamenti() {
  var abbonamenti = [];
  for (var j = 0; j < abbonamentiDefault.length; j++) {
    var a = abbonamentiDefault[j];
    abbonamenti.push({
      id: a.id,
      prezzo: parseInt(document.getElementById('abb_prezzo_' + a.id).value),
      servizi: parseInt(document.getElementById('abb_servizi_' + a.id).value)
    });
  }
  
  if (supabaseClient) {
    supabaseClient.from('config_prezzi').upsert({ id: 'abbonamenti', dati: abbonamenti }).then(function() {
      showSuccess('Abbonamenti salvati su Supabase');
    }).catch(function(err) {
      showError('Errore: ' + err.message);
    });
  }
}

function showSuccess(msg) {
  var alert = document.getElementById('successAlert');
  alert.textContent = msg;
  alert.classList.add('show');
  setTimeout(function() { alert.classList.remove('show'); }, 3000);
}

function showError(msg) {
  var alert = document.getElementById('errorAlert');
  alert.textContent = msg;
  alert.classList.add('show');
  setTimeout(function() { alert.classList.remove('show'); }, 5000);
}
</script>

</body>
</html>
